</head>
<body>

</div>

</div>

<div class="left-trees">

    <div class="tree">
        <div class="leaves"></div>
        <div class="trunk"></div>
    </div>

    <div class="tree">
        <div class="leaves"></div>
        <div class="trunk"></div>
    </div>

</div>

<div class="right-trees">

    <div class="tree">
        <div class="leaves"></div>
        <div class="trunk"></div>
    </div>

    <div class="tree">
        <div class="leaves"></div>
        <div class="trunk"></div>

<div class="fireflies">

<span></span>

</div>
    <!-- Hero Section -->

<header class="hero">

<h1>TaskFlow</h1>

<p class="tagline">
Organize your day. Achieve your goals.
</p>

<p class="quote">
"Small steps every day lead to big achievements."
</p>

<button id="themeToggle">🌙 Night Mode</button>

</header>
   

    <!-- Main Container -->

    <div class="container">

        <!-- Input -->

        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task..."
            >

            <button id="addTaskBtn">
                Add Task
            </button>

        </div>

        <!-- Filters -->

        <div class="filters">

            <button id="allBtn">
                All 
            </button>

            <button id="activeBtn">
                INCOMPLETE 
            </button>

            <button id="completedBtn">
                COMPLETED 
            </button>

        </div>

        <!-- Task List -->

        <ul id="taskList">

        </ul>

        <!-- Statistics -->

        <div class="stats">

            <p id="taskCount">
                Total Tasks: 0
            </p>

            <p id="completedCount">
                Completed: 0
            </p>

            <p id="remainingCount">
                Remaining: 0
            </p>

        </div>

    </div>

    <!-- Footer -->

    <footer>

        <p>
            Stay productive. Stay focused.
        </p>

    </footer>

    <script src="script.js"></script>

</body>
</html>
